# .github/workflows/deploy.yml - CI/CD para producción
name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permitir ejecución manual

jobs:
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Secret Scanner
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified
      
      - name: Check for exposed credentials
        run: |
          # Buscar credenciales expuestas en el código
          if grep -r "SUPABASE_ANON_KEY" --include="*.js" --exclude="config.example.js" .; then
            echo "⚠️ ADVERTENCIA: Se encontró SUPABASE_ANON_KEY en archivos que no son config.example.js"
            exit 1
          fi
          
          if grep -r "eyJhbGciOiJIUzI1Ni" --include="*.js" --exclude="config.example.js" .; then
            echo "⚠️ ADVERTENCIA: Posible clave JWT expuesta en archivos que no son config.example.js"
            exit 1
          fi

  lint:
    name: 📝 Lint Code
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install ESLint
        run: npm install -g eslint
        
      - name: Run ESLint
        run: eslint js/**/*.js --ignore-pattern "js/config.js"
        
  build:
    name: 🏗️ Build Project
    runs-on: ubuntu-latest
    needs: [security-scan, lint]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config from example
        run: |
          cp js/config.example.js js/config.js
          sed -i "s|your_supabase_url_here|${{ secrets.SUPABASE_URL }}|g" js/config.js
          sed -i "s|your_supabase_anon_key_here|${{ secrets.SUPABASE_ANON_KEY }}|g" js/config.js
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: |
            ./
            !node_modules
            !.git
            !js/config.js
            !.env

  deploy-netlify:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'